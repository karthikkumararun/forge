name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build, typecheck, smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Install
        run: npm install --no-audit --no-fund

      - name: Typecheck (extension host)
        run: npx tsc -p tsconfig.json --noEmit

      - name: Typecheck (webviews)
        run: npx tsc -p tsconfig.webview.json --noEmit

      - name: Build
        run: npm run build

      - name: Unit tests (vitest)
        run: npm test

      - name: Headless smoke tests
        run: |
          npx esbuild scripts/smoke.ts --bundle --platform=node --target=node18 \
            --external:simple-git --outfile=dist/smoke.js
          node dist/smoke.js

      - name: Verify package (vsce)
        run: npx --yes @vscode/vsce@latest package --no-dependencies --out forge-ci.vsix

      - name: Upload .vsix artifact
        uses: actions/upload-artifact@v4
        with:
          name: forge-vsix
          path: forge-ci.vsix
          if-no-files-found: error
          retention-days: 14
